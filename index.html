<!DOCTYPE html>
<html>
   <head>
      <!-- ตั้งชื่อเว็บที่จะปรากฏบน Tab ของ Browser -->
      <title>Aziz Cup ครั้งที่ 7</title>
      
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <base target="_top">

      <!-- ส่วนของ Icon และ Web App -->
      <link rel="apple-touch-icon" href="icon-180.jpg">
      <link rel="icon" type="image/jpg" href="icon-180.jpg">
      <meta name="apple-mobile-web-app-title" content="ReFaYa Finances">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="default">
      
      <style>
         body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, sans-serif; }
         
         /* หน้าจอ Loading */
         #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
         }

         /* โลโก้ในหน้า Loading */
         .loader-logo {
            width: 100px;
            height: 100px;
            border-radius: 22px; /* โค้งมนแบบไอคอนแอป */
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
         }

         /* ตัวหมุน Loading */
         .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff; /* สีฟ้า */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
         }

         @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
         }

         .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
         }

         iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
      </style>
   </head>
   <body>

      <!-- ส่วนหน้าจอ Loading -->
      <div id="loading-screen">
         <img src="icon-180.jpg" alt="Logo" class="loader-logo">
         <div class="spinner"></div>
         <div class="loading-text">กำลังเริ่มต้น ReFaYa Finances...</div>
      </div>

      <!-- ส่วนแอปพลิเคชัน -->
      <iframe id="mainIframe" src="https://script.google.com/macros/s/AKfycbzwpCb3ZZm3lScVbn6ZLm_EsYxhbpYRm2fnTdOdMRhUCieHHpZ1xH2HI_aVJ6Tp2XME/exec"></iframe>

      <script>
         const iframe = document.getElementById('mainIframe');
         const loadingScreen = document.getElementById('loading-screen');

         // เมื่อ iframe โหลดข้อมูลเสร็จสิ้น
         iframe.onload = function() {
            // ค่อยๆ จางหน้าโหลดออก
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
               loadingScreen.style.display = 'none';
            }, 500); // 0.5 วินาทีหลังจากจาง
         };
      </script>

   </body>
</html>
